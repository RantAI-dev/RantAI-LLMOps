# Portainer Stack — NQRust LLMOps
# Deploy via Portainer > Stacks > Add Stack > Web editor (paste this file)
# or via Portainer Git integration pointing to this repo.
#
# Prerequisites on the Docker host:
#   - nvidia-container-toolkit installed (for GPU)
#   - ~/.transformerlab exists with TL backend set up
#   - ghcr.io/rantai-dev/rantai-llmops image accessible (public or logged-in)
#   - For the FE: either (a) build image first and set FRONTEND_IMAGE, or
#     (b) use Portainer Git integration so the build context is available
#
# Required env vars (set in Portainer > Stacks > Environment variables):
#   TL_HOME        — absolute path to your .transformerlab dir, e.g. /home/harpun/.transformerlab
#   REPO_PATH      — absolute path to this repo, e.g. /home/harpun/Documents/NQRust-LLMOps
#   APP_PASSWORD   — password to protect the web UI (can be empty to disable)
#   AUTH_SECRET    — NextAuth secret (generate: openssl rand -base64 32)
#   HF_TOKEN       — HuggingFace token (optional, for private models)
#   INFERENCE_API_KEY — TransformerLab API key (from TL dashboard, optional)

services:
  # ─── Backend (TransformerLab) ────────────────────────────────────────────────
  transformerlab:
    image: ghcr.io/rantai-dev/rantai-llmops:latest
    container_name: transformerlab
    environment:
      - HOME=${TL_HOME}
      - PATH=${TL_HOME}/miniforge3/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - PYTHONUNBUFFERED=1
    volumes:
      # TL home: src, conda envs, models, jobs, orgs data
      - ${TL_HOME}:${TL_HOME}
      # Serve/merge/export pipeline scripts
      - ${REPO_PATH}/scripts/serve/rantai_serve_finetune.sh:${TL_HOME}/../rantai_serve_finetune.sh:ro
      - ${REPO_PATH}/scripts/serve/rantai_merge.sh:${TL_HOME}/../rantai_merge.sh:ro
      - ${REPO_PATH}/scripts/serve/rantai_export_gguf.sh:${TL_HOME}/../rantai_export_gguf.sh:ro
    working_dir: ${TL_HOME}/src
    command: >
      bash -lc 'until [ -x "$$HOME/.transformerlab/miniforge3/bin/conda" ] && [ -f "$$HOME/.transformerlab/src/run.sh" ]; do echo "waiting for mount"; sleep 2; done &&
      eval "$$(conda shell.bash hook)" &&
      conda activate "$$HOME/.transformerlab/envs/transformerlab" &&
      exec ./run.sh -c -p 8339'
    ports:
      - "8339:8339"
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - llmops

  # ─── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/rantai-dev/rantai-llmops-fe:latest
    container_name: rantai-frontend
    environment:
      - INFERENCE_BASE_URL=http://transformerlab:8339/v1
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - INFERENCE_MODEL=${INFERENCE_MODEL:-qwen2.5:0.5b}
      - HOST_RUNNER=docker
      - DOCKER_CONTAINER=transformerlab
      - APP_PASSWORD=${APP_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET}
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - transformerlab
      - ollama
    restart: unless-stopped
    networks:
      - llmops

volumes:
  ollama_data:

networks:
  llmops:
    driver: bridge
