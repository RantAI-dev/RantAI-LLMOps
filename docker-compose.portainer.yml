# Portainer Stack — NQRust LLMOps
# Deploy via Portainer > Stacks > Add Stack > Web editor (paste this file)
# or via Portainer Git integration pointing to this repo.
#
# Prerequisites on the Docker host:
#   - nvidia-container-toolkit installed (for GPU)
#   - the two images below pullable (public, or `docker login ghcr.io` first)
#   - ~60+ GB free disk: the backend image is ~41 GB and its named volume is
#     seeded from it on first run
#   NOTE: a host TL install (~/.transformerlab) and a checkout of this repo are
#   NO LONGER needed — the backend image is self-contained.
#
# First run (the backend has no API key until you make one):
#   1. deploy this stack (the frontend will start but can't reach TL yet)
#   2. bash scripts/bootstrap-tl-auth.sh   (TL_URL=http://<host>:8339)
#   3. paste the INFERENCE_API_KEY it writes into this stack's env, redeploy
#
# Building the backend image: NOT on a GitHub-hosted runner — it needs ~41 GB and
# those runners have ~14 GB. Build it on the GPU host itself:
#   docker build -f docker/backend/Dockerfile -t <tag> .
#   (add --build-arg TLAB_FORCE_CUDA13=1 on a DGX Spark / GB10 box like the GX10)
#
# Required env vars (set in Portainer > Stacks > Environment variables):
#   APP_PASSWORD   — password to protect the web UI (can be empty to disable)
#   AUTH_SECRET    — NextAuth secret (generate: openssl rand -base64 32)
#   HF_TOKEN       — HuggingFace token (optional, for private models)
#   INFERENCE_API_KEY — backend API key. NOT optional if you want the UI to
#                    reach TL. A fresh TL has no key; mint one with
#                    `bash scripts/bootstrap-tl-auth.sh` (it also creates the
#                    rantai-ft / rantai-eval experiments and raises the quota),
#                    then paste the value it writes to .env.tl-bootstrap here.
#   TRANSFORMERLAB_JWT_SECRET     — REQUIRED. openssl rand -hex 32
#   TRANSFORMERLAB_REFRESH_SECRET — REQUIRED, and DIFFERENT from the one above.
#                    Without both, TL still answers `/` but every login returns
#                    500 (jwt.encode gets None -> "TypeError: Expected a string
#                    value"), so the bootstrap and the UI cannot authenticate.

services:
  # ─── Backend (LLMOps engine) ─────────────────────────────────────────────────
  rantai-backend:
    # SELF-CONTAINED image (built from docker/backend/Dockerfile): the TL source,
    # the conda env with torch+CUDA, the rantai_* serve scripts, llama.cpp and the
    # Ollama CLI are all BAKED IN — so the host needs NO ~/.transformerlab and no
    # checkout of this repo. That is the whole point of it.
    #
    # Contrast: ghcr.io/rantai-dev/rantai-llmops (docker/Dockerfile) is the THIN
    # container — it bind-mounts a host TL install you must build by hand first.
    #
    # NOTE: this image is ~41 GB and cannot be built on a GitHub-hosted runner
    # (14 GB disk). Build it on the GPU host itself — see the header.
    #
    # PINNED BY DIGEST — DO NOT change back to :latest.
    # The backend carries Transformer Lab, whose DB schema lives in the tl_data
    # volume. On 2026-07-21 a deploy pulled a newer :latest backend; the newer TL
    # replaced the job/eval DB with a fresh (empty) schema and the job HISTORY was
    # lost (no backup). Pinning the digest means a redeploy NEVER silently upgrades
    # TL and migrates the DB. To intentionally move to a new backend: build+test it,
    # then update this digest deliberately AND back up the tl_data volume first.
    image: ${BACKEND_IMAGE:-ghcr.io/rantai-dev/rantai-llmops-backend@sha256:d4c323c76cbe7caf4f8c7eecbf9f052ef389bf38bdd104c380563134cd49d4be}
    container_name: rantai-backend
    environment:
      - PYTHONUNBUFFERED=1
      # GB10 / DGX Spark (the GX10): force the CUDA 13 (cu130) PyTorch index for
      # BOTH the base conda env (install.sh) AND every per-job training venv
      # (local.py). Inside a container the host's /etc/dgx-release is invisible,
      # so TL can't auto-detect the Spark and would otherwise fall back to cu128 /
      # default → CPU-only torch on arm64 → "Unsloth cannot find any torch
      # accelerator". Set to 1 on any GB10 host. Harmless (ignored) elsewhere.
      - TLAB_FORCE_CUDA13=1
      # REQUIRED — see the header. Unset = TL serves `/` but every login 500s.
      - TRANSFORMERLAB_JWT_SECRET=${TRANSFORMERLAB_JWT_SECRET:?set it — openssl rand -hex 32}
      - TRANSFORMERLAB_REFRESH_SECRET=${TRANSFORMERLAB_REFRESH_SECRET:?set it — openssl rand -hex 32, different from JWT_SECRET}
      # `ollama create` (the export pipeline) targets the ollama service below.
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      # Named volume, seeded from the image on first run, then holds the mutable
      # state: models, adapters, jobs, orgs data. No host path to prepare.
      - tl_data:/root/.transformerlab
    ports:
      - "8339:8339"
    # NO privileged needed: the entrypoint disables bwrap by default so TL uses
    # its unprivileged HOME-override isolation (many hosts, incl. the GX10, forbid
    # privileged containers). For stronger bwrap sandboxing on a host that DOES
    # allow it, set `privileged: true` here AND environment `RANTAI_SANDBOX=1`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops

  # ─── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    # NO host port published: Ollama is auth-less and serves every pulled model,
    # so it must NOT be reachable from the network directly. Internal clients
    # (frontend, backend export, gateway) reach it as `ollama:11434` over the
    # llmops network. External clients (e.g. RantAI Agents) go through the gateway
    # below, which enforces an API key + a deployed-model allowlist.
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops

  # ─── vLLM (second inference engine: safetensors, FULL PRECISION) ─────────────
  # The peer to Ollama, managed by this stack the same way. Ollama serves many
  # quantized (GGUF) models on demand; vLLM serves ONE model at full precision,
  # chosen via VLLM_MODEL. Reached internally as `vllm:8000` (the frontend's
  # VLLM_BASE_URL). Like Ollama, NO host port to the network — internal only.
  #
  # VLLM_MODEL can be either:
  #   - a Hugging Face id (the default), pulled into the cache volume on first start; or
  #   - a LOCAL path to a merged fine-tune, e.g.
  #       /root/.transformerlab/rantai_merged/<name>
  #     (tl_data is mounted read-only below so those are reachable). Whether a
  #     given fine-tune loads depends on vLLM supporting its architecture.
  # Changing the model = edit the env and redeploy this stack: vLLM has ONE model
  # per instance by design and cannot hot-swap like Ollama.
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: rantai-vllm
    ipc: host
    entrypoint: ["vllm", "serve"]
    command:
      - ${VLLM_MODEL:-aisingapore/Qwen-SEA-LION-v4-8B-VL}
      - --served-model-name
      - ${VLLM_SERVED_NAME:-qwen-sea-lion-v4-8b}
      - --gpu-memory-utilization
      - "${VLLM_GPU_UTIL:-0.22}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-16384}"
      - --trust-remote-code
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - vllm_hf_cache:/root/.cache/huggingface
      # Read-only view of Transformer Lab's data so vLLM can serve a merged
      # fine-tune by local path (see VLLM_MODEL above).
      - tl_data:/root/.transformerlab:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops

  # ─── Gateway (auth + model allowlist in front of Ollama) ─────────────────────
  # The ONLY LLM endpoint exposed to the network. Reuses the backend image purely
  # to run docker/backend/gateway.py (no volume, no install) — every request needs
  # `Authorization: Bearer <key>` and chat/completions are refused unless the model
  # is in the allowlist. Point external clients (Agents) at http://<host>:8080/v1.
  #
  # TIER 1 (now): configure via the two env vars below (set them in Portainer):
  #   GATEWAY_API_KEYS        comma-separated keys clients must send. EMPTY=deny all.
  #   GATEWAY_ALLOWED_MODELS  comma-separated model tags to expose. EMPTY=allow all.
  # TIER 2 (later): set GATEWAY_CONFIG_FILE to a JSON file on a shared volume that
  #   the Deployments UI writes — access then changes live, no restart.
  rantai-gateway:
    image: ${BACKEND_IMAGE:-ghcr.io/rantai-dev/rantai-llmops-backend@sha256:d4c323c76cbe7caf4f8c7eecbf9f052ef389bf38bdd104c380563134cd49d4be}
    container_name: rantai-gateway
    entrypoint: ["python3", "/opt/rantai/gateway.py"]
    environment:
      - GATEWAY_UPSTREAM=http://ollama:11434
      - GATEWAY_PORT=8080
      # TIER 2: the Deployments UI writes this shared file; the gateway re-reads it
      # per request (models + keys change live, no restart). The two env vars below
      # are only the Tier-1 fallback, used until the UI writes the file.
      - GATEWAY_CONFIG_FILE=/uidata/gateway-config.json
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS:-}
      - GATEWAY_ALLOWED_MODELS=${GATEWAY_ALLOWED_MODELS:-}
    volumes:
      # Read-only view of the frontend's data dir: the Deployments UI writes
      # gateway-config.json there; we only read it. RO so the network-facing gateway
      # can never tamper with app data even if compromised.
      - ui_data:/uidata:ro
    ports:
      # Host port for external clients (Agents). 8080 is a common conflict, so it's
      # configurable — the GX10 deploy uses 11435. Container port stays 8080.
      - "${GATEWAY_HOST_PORT:-11435}:8080"
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - llmops

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    # Override to test a locally built image: FRONTEND_IMAGE=rantai-llmops-fe:test
    image: ${FRONTEND_IMAGE:-ghcr.io/rantai-dev/rantai-llmops-fe:latest}
    container_name: rantai-frontend
    environment:
      - INFERENCE_BASE_URL=http://rantai-backend:8339/v1
      # Mint both with scripts/bootstrap-tl-auth.sh against a running backend.
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-}
      # Optional: if left empty the API key falls back to the admin's personal
      # team (TL resolves it server-side), which is what a fresh install wants.
      - INFERENCE_TEAM_ID=${INFERENCE_TEAM_ID:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      # Optional second engine: a permanent vLLM service (safetensors, full
      # precision) reachable by its network alias `vllm`. Leave unset to keep the
      # Serve UI showing vLLM as "not configured" (never an error). See the
      # standalone `rantai-vllm` container serving Qwen-SEA-LION-v4-8B.
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
      # GPU widget reads nvidia-smi from the backend's sidecar (the frontend has
      # no GPU). Points at the backend service on the sidecar port (see
      # docker/backend/gpu-server.py).
      - GPU_STATS_URL=http://rantai-backend:8341
      - INFERENCE_MODEL=${INFERENCE_MODEL:-qwen2.5:0.5b}
      # Max output tokens per chat reply. Bump to e.g. 8192 for long/reasoning
      # answers that would otherwise get cut off ("terpotong"). Default 4096.
      - CHAT_MAX_TOKENS=${CHAT_MAX_TOKENS:-4096}
      # In-app export (merge → GGUF → `ollama create`) runs its pipeline scripts
      # INSIDE the backend via the backend's export sidecar over HTTP — so the UI
      # needs NO Docker socket / bind mount (see docker/backend/export-server.py).
      - HOST_RUNNER=sidecar
      - EXPORT_SIDECAR_URL=http://rantai-backend:8342
      # Optional S3/MinIO credentials. Set these to train directly from an
      # `s3://bucket/prefix/` dataset — the corpus then never has to be published
      # to the Hugging Face Hub to be trainable. Forwarded to each training job.
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET}
      - HF_TOKEN=${HF_TOKEN:-}
      # Tier-2 gateway control: the Deployments UI writes the gateway's live config
      # (exposed models + API keys) into its OWN data dir (appuser-owned), which the
      # gateway mounts READ-ONLY — avoids the fresh-shared-volume ownership race.
      - GATEWAY_CONFIG_PATH=/data/gateway-config.json
      # Optional: explicit gateway URL shown to clients in the Deployments UI. Leave
      # empty and the UI derives http://<this-host>:<GATEWAY_HOST_PORT>/v1 itself.
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL:-}
    volumes:
      # Server-side stores (deployments, settings, job logs, inference log).
      # Matches RANTAI_DATA_DIR=/data in Dockerfile.frontend — without this the
      # data is lost on every container replace.
      - ui_data:/data
      # NOTE: in-app GGUF export needs NO Docker socket anymore. The merge → GGUF →
      # `ollama create` pipeline runs inside the backend via its export sidecar
      # (HOST_RUNNER=sidecar + EXPORT_SIDECAR_URL above), so the whole stack stays
      # bind-mount-free (matches what we told DTI). Training, chat, live monitor,
      # eval AND export all work without any host bind mount.
    ports:
      - "3000:3000"
    depends_on:
      - rantai-backend
      - ollama
    restart: unless-stopped
    networks:
      - llmops

volumes:
  ollama_data:
  # Seeded from the backend image on first run (~41 GB) — do not point this at a
  # small disk.
  tl_data:
  ui_data:
  # vLLM's Hugging Face cache — keeps the served model across restarts so it is
  # not re-downloaded every time the container recreates.
  vllm_hf_cache:

networks:
  llmops:
    driver: bridge
