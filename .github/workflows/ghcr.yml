# Publishes the images this project deploys with.
#
# SCOPE — read before adding a job for the self-contained backend:
#   `publish-backend` below builds docker/Dockerfile, the THIN container: CUDA
#   base + bwrap + uv (~600 MB). It has no TL source and no torch, so the host it
#   runs on must already have a hand-built ~/.transformerlab bind-mounted in.
#
#   The SELF-CONTAINED backend (docker/backend/Dockerfile) is deliberately NOT
#   built here. It bakes conda + torch/CUDA and lands at ~41 GB, while a
#   GitHub-hosted runner has ~14 GB of free disk — the build cannot fit, even
#   with the free-disk-space actions. On top of that the GX10 is arm64, so a
#   cross-build here would run under QEMU and take hours.
#
#   Build it on the GPU host instead:
#     docker build -f docker/backend/Dockerfile -t ghcr.io/rantai-dev/rantai-llmops-backend:latest .
#     # on a DGX Spark / GB10 (the GX10): add --build-arg TLAB_FORCE_CUDA13=1
#     docker push ghcr.io/rantai-dev/rantai-llmops-backend:latest
#
#   To move it into CI later, both need solving first: (1) slim the image with a
#   multi-stage build (build in -devel, copy the env into a -runtime base — the
#   CUDA toolkit is currently installed 2-3x over), and (2) use a native arm64
#   runner (self-hosted on the GX10, or GitHub's arm64 runners).
name: Publish GHCR Image

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-backend:
    # The THIN backend (needs a host ~/.transformerlab). See the note at the top.
    name: Build and push Backend image (thin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  publish-frontend:
    name: Build and push Frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-fe
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  publish-backend-slim:
    # The SELF-CONTAINED backend (docker/backend/Dockerfile.first-run). Unlike the
    # thin image above, this one needs NO host ~/.transformerlab: the ~15 GB
    # conda/torch env is installed into the named volume on the FIRST container
    # start (see docker/backend/entrypoint.sh). The IMAGE stays ~5 GB, so it fits
    # a GitHub runner AND cross-builds to arm64 cheaply — the heavy, arch-specific
    # install happens natively at run time on the target (e.g. the GX10's arm64).
    # This is the image docker-compose.portainer.yml deploys.
    name: Build and push Backend image (self-contained, slim)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (backend-slim)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-backend
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push backend (slim)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/backend/Dockerfile.first-run
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-slim
          cache-to: type=gha,scope=backend-slim,mode=max
