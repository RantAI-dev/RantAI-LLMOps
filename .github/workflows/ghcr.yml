# Publishes the two custom images this stack deploys. The third service, Ollama,
# uses the official ollama/ollama image — nothing to build here.
#
#   rantai-llmops-fe        (Dockerfile.frontend)              — the Next.js UI
#   rantai-llmops-backend   (docker/backend/Dockerfile.first-run) — Transformer Lab,
#       SELF-CONTAINED: the ~15 GB conda/torch env installs into a named volume on
#       FIRST RUN, so the IMAGE stays ~5 GB and needs no host ~/.transformerlab.
#
# ARM64-ONLY, on NATIVE arm64 runners (`ubuntu-24.04-arm`). The only deploy target
# is the GX10 / DGX Spark, which is arm64 — so we don't build amd64. This also
# ends the QEMU pain: cross-building arm64 via QEMU on an amd64 runner made the
# backend's `apt-get install` SEGFAULT in libc-bin's `ldconfig` (glibc 2.35 under
# QEMU, exit 139) and made the frontend build take ~45 min. Native arm64 runners
# have no emulation → no segfault, and are fast. (If an amd64 image is ever needed
# for local testing, add a second matrix leg on `ubuntu-latest` + a manifest merge.)
#
# Triggered on a GitHub release (or manual dispatch). docker/Dockerfile (the thin
# bind-mount container) is intentionally NOT published — local dev only.
name: Publish GHCR Image

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-frontend:
    name: Build and push Frontend image
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-fe
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  publish-backend-slim:
    # The SELF-CONTAINED backend (docker/backend/Dockerfile.first-run). The ~15 GB
    # conda/torch env installs into the named volume on the FIRST container start
    # (see docker/backend/entrypoint.sh), so the IMAGE stays ~5 GB. This is the
    # image docker-compose.portainer.yml deploys.
    name: Build and push Backend image (self-contained, slim)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (backend-slim)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-backend
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push backend (slim)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/backend/Dockerfile.first-run
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-slim
          cache-to: type=gha,scope=backend-slim,mode=max
