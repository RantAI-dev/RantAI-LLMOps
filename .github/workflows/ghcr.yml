# Publishes the two custom images this stack deploys. The third service, Ollama,
# uses the official ollama/ollama image — nothing to build here.
#
#   rantai-llmops-fe        (Dockerfile.frontend)              — the Next.js UI
#   rantai-llmops-backend   (docker/backend/Dockerfile.first-run) — Transformer Lab,
#       SELF-CONTAINED: the ~15 GB conda/torch env installs into a named volume on
#       FIRST RUN, so the IMAGE stays ~5 GB (fits a GitHub runner) and needs no host
#       ~/.transformerlab setup. The heavy, arch-specific install runs natively at
#       run time on the target — including the GX10's arm64.
#
# Both build multi-arch (amd64 + arm64). Triggered on a GitHub release (or manual
# dispatch). NOTE: docker/Dockerfile (the thin container that bind-mounts a host
# TL install) is intentionally NOT published — it's kept only for local dev via
# docker/docker-compose.yml.
name: Publish GHCR Image

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-frontend:
    name: Build and push Frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-fe
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  publish-backend-slim:
    # The SELF-CONTAINED backend (docker/backend/Dockerfile.first-run). Unlike the
    # thin image above, this one needs NO host ~/.transformerlab: the ~15 GB
    # conda/torch env is installed into the named volume on the FIRST container
    # start (see docker/backend/entrypoint.sh). The IMAGE stays ~5 GB, so it fits
    # a GitHub runner AND cross-builds to arm64 cheaply — the heavy, arch-specific
    # install happens natively at run time on the target (e.g. the GX10's arm64).
    # This is the image docker-compose.portainer.yml deploys.
    name: Build and push Backend image (self-contained, slim)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata (backend-slim)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rantai-dev/rantai-llmops-backend
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Build and push backend (slim)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/backend/Dockerfile.first-run
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-slim
          cache-to: type=gha,scope=backend-slim,mode=max
