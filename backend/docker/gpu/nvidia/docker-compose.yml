services:
  transformerlab-api:
    image: transformerlab/api:latest
    container_name: transformerlab-api
    ports:
      - "8338:8338"
    ipc: host
    volumes:
      - transformerlab_data:/root/.transformerlab/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "all"
              capabilities: [gpu]
    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  transformerlab_data:
